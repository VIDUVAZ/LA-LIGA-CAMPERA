<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Liga de los Pinchazos | VIP CLUB</title>

    <!-- Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK v11 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        window.fb = { initializeApp, getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }
        .club-gradient { background: radial-gradient(circle at top, rgba(234, 88, 12, 0.2), transparent 70%); }
        .neon-glow { filter: drop-shadow(0 0 8px rgba(234, 88, 12, 0.8)); }
        .animate-pulse-slow { animation: pulse-slow 3s infinite ease-in-out; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        .animate-toast { animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-slow { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }

        ::-webkit-scrollbar { width: 0px; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        
        .app-container {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDx0U0vqcPYna5UQaIjnxEYJupv1PaewZA",
            authDomain: "la-liga-campera-d0c55.firebaseapp.com",
            projectId: "la-liga-campera-d0c55",
            storageBucket: "la-liga-campera-d0c55.firebasestorage.app",
            messagingSenderId: "679865509771",
            appId: "1:679865509771:web:4b3a29ea6e0d13e0f9f18e",
            measurementId: "G-XVNZ6KWF1Z"
        };

        const appId = "la-liga-v1"; 

        const MONTHS = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        const ACTIVITIES = [
            { id: 'estandar', label: 'Pinchazo estándar', points: 3, desc: 'Introducir el hurón en la cueva.' },
            { id: 'conejero', label: 'Conejero rápido', points: 2, desc: '4 o 5 estoques a tope de revoluciones.' },
            { id: 'daison', label: 'Daison', points: 1, desc: 'Succión de cilindro o meter cabeza en cueva.' },
            { id: 'martillo', label: 'Martillo Neumático', points: 2, desc: 'Pajita o cubana sacando el veneno.' },
            { id: 'tras', label: 'Tras tras por detrás', points: 12, desc: 'Entrar por la puerta campo.' },
            { id: 'juegos', label: 'Vamos a jugar', points: 1, desc: 'Uso de juegos eróticos.' },
            { id: 'aventura', label: 'A la aventura', points: 10, desc: 'Sitio poco usual (Requiere ubicación).' },
            { id: 'bonus_racha', label: 'BONUS RACHA', points: 2, desc: 'Actividad registrada 2 días seguidos.' },
        ];

        const MOTIVATIONAL_PHRASES = [
            "¡Menudo semental! Los burros están orgullosos de ti. 🐎",
            "¡Punto para el equipo! Sigue regando ese jardín. 🌱",
            "¡Qué despliegue de energía! Eres una leyenda. 🔥",
            "¡Victoria magistral! El ranking empieza a temblar. 🏆",
            "¡Eso es puntería y lo demás son tonterías! 🎯",
            "¡Nivel Dios activado! Tu racha es imparable. ⚡",
            "¡Menudo estoque! Don Juan estaría celoso. ⚔️",
            "¡Tienes el cilindro limpio y el tanque vacio! 📖",
            "¡Eso ha tenido que doler... de lo bueno que ha sido! 💥",
            "¡Socio de honor! Mantén ese ritmo, campeón. 🎖️"
        ];

        function App() {
            const [perfil, setPerfil] = useState(null);
            const [vista, setVista] = useState('ranking'); 
            const [logs, setLogs] = useState([]);
            const [usuarios, setUsuarios] = useState([]);
            const [formLogin, setFormLogin] = useState({ nombre: '', pin: '' });
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [toast, setToast] = useState(null);

            useEffect(() => {
                const initFirebase = async () => {
                    const { initializeApp, getFirestore, getAuth, signInAnonymously, onAuthStateChanged } = window.fb;
                    try {
                        const app = initializeApp(firebaseConfig);
                        const authInstance = getAuth(app);
                        const dbInstance = getFirestore(app);
                        setDb(dbInstance);
                        await signInAnonymously(authInstance);
                        const unsubscribe = onAuthStateChanged(authInstance, (u) => {
                            setUser(u);
                            setLoading(false);
                        });
                        return () => unsubscribe();
                    } catch (err) {
                        setError("Error de conexión con Firebase.");
                        setLoading(false);
                    }
                };
                const timer = setInterval(() => { if (window.fb) { initFirebase(); clearInterval(timer); } }, 100);
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const { collection, onSnapshot, doc, setDoc } = window.fb;
                
                const unsubUsers = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (s) => {
                    const dbUsers = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (dbUsers.length === 0) {
                        const adminId = 'admin_root';
                        setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', adminId), {
                            id: adminId, name: 'ADMIN', pin: '1234', role: 'admin'
                        });
                    }
                    setUsuarios(dbUsers);
                    const sesion = localStorage.getItem('pinchazos_vip');
                    if (sesion) {
                        const perfilLocal = JSON.parse(sesion);
                        const userDB = dbUsers.find(u => u.id === perfilLocal.id);
                        if (userDB) setPerfil(userDB);
                    }
                });

                const unsubLogs = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), (s) => {
                    const data = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    setLogs(data.sort((a, b) => (b.date || "").localeCompare(a.date || "")));
                });

                return () => { unsubUsers(); unsubLogs(); };
            }, [user, db]);

            const entrar = (e) => {
                e.preventDefault();
                const u = usuarios.find(u => u.name.toUpperCase() === formLogin.nombre.toUpperCase() && String(u.pin) === String(formLogin.pin));
                if (u) { 
                    setPerfil(u); 
                    localStorage.setItem('pinchazos_vip', JSON.stringify(u)); 
                }
            };

            const salir = () => {
                localStorage.removeItem('pinchazos_vip');
                setPerfil(null);
                setVista('ranking');
                setFormLogin({ nombre: '', pin: '' });
            };

            const registrarPinchazo = async (selectedIds, location, date) => {
                if (!perfil || !db || !user) return;
                const { collection, addDoc, serverTimestamp } = window.fb;
                const dateObj = new Date(date);
                const yesterday = new Date(dateObj);
                yesterday.setDate(yesterday.getDate() - 1);
                const prevDateStr = yesterday.toISOString().split('T')[0];
                const hasStreak = logs.some(l => l.userId === perfil.id && l.date === prevDateStr);

                let finalIds = [...selectedIds];
                if (hasStreak) finalIds.push('bonus_racha');
                const totalPoints = finalIds.reduce((s, id) => s + (ACTIVITIES.find(a => a.id === id)?.points || 0), 0);

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                    userId: perfil.id, 
                    userName: perfil.name, 
                    activities: finalIds, 
                    points: totalPoints, 
                    location: location || "", 
                    date, 
                    createdAt: serverTimestamp(), 
                    isStreak: hasStreak
                });

                const phrase = MOTIVATIONAL_PHRASES[Math.floor(Math.random() * MOTIVATIONAL_PHRASES.length)];
                setToast(phrase);
                setTimeout(() => setToast(null), 4000);
                setVista('ranking');
            };

            if (loading) return (
                <div className="min-h-screen bg-black flex flex-col items-center justify-center p-10 text-center">
                    <div className="w-12 h-12 border-4 border-orange-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <div className="text-orange-600 font-black tracking-widest uppercase italic text-sm">Cargando...</div>
                </div>
            );

            if (!perfil) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 club-gradient animate-in relative overflow-hidden w-full">
                    <div className="mb-8 animate-pulse-slow neon-glow">
                        <svg width="120" height="120" viewBox="0 0 24 24" fill="none">
                            <path d="M12 21C12 21 2 13.5 2 8.5C2 5.5 4.5 3 7.5 3C9.4 3 11 4 12 5.5C13 4 14.6 3 16.5 3C19.5 3 22 5.5 22 8.5C22 13.5 12 21 12 21Z" stroke="#ea580c" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                    </div>
                    <h1 className="text-4xl md:text-6xl font-black text-center mb-12 uppercase italic leading-[0.9]">
                        LA LIGA DE LOS <br/>
                        <span className="text-orange-600 neon-text">PINCHAZOS</span>
                    </h1>
                    <form onSubmit={entrar} className="w-full max-w-sm space-y-4 relative z-10">
                        <input type="text" placeholder="SOCIO" className="w-full bg-[#111] p-6 rounded-2xl text-center font-black uppercase text-white border border-[#222] focus:border-orange-600 outline-none transition-all placeholder-gray-700 text-lg" value={formLogin.nombre} onChange={e => setFormLogin({...formLogin, nombre: e.target.value})} />
                        <input type="password" placeholder="PIN" className="w-full bg-[#111] p-6 rounded-2xl text-center font-black text-white border border-[#222] focus:border-orange-600 outline-none transition-all placeholder-gray-700 text-lg" value={formLogin.pin} onChange={e => setFormLogin({...formLogin, pin: e.target.value})} />
                        <button type="submit" className="w-full bg-orange-600 p-6 rounded-2xl font-black uppercase text-white shadow-[0_0_30px_rgba(234,88,12,0.3)] active:scale-95 transition-all text-lg">ACCESO EXCLUSIVO</button>
                    </form>
                </div>
            );

            return (
                <div className="app-container bg-[#0a0a0c] club-gradient animate-in relative w-full overflow-hidden">
                    <header className="p-6 border-b border-[#1a1a1a] flex justify-between items-center bg-black/80 backdrop-blur-xl sticky top-0 z-50 w-full">
                        <h2 className="font-black italic text-white uppercase text-base md:text-xl tracking-tight">PINCHAZOS <span className="text-orange-600">VIP</span></h2>
                        <div className="flex items-center gap-3">
                           <span className="text-[10px] font-black uppercase bg-orange-600/10 px-4 py-1.5 rounded-full text-orange-500 border border-orange-600/20">{perfil.name}</span>
                        </div>
                    </header>
                    <main className="flex-1 p-6 pb-40 overflow-y-auto no-scrollbar w-full max-w-5xl mx-auto">
                        {vista === 'ranking' && <RankingView logs={logs} users={usuarios} />}
                        {vista === 'add' && <AddView onAdd={registrarPinchazo} onClose={() => setVista('ranking')} />}
                        {vista === 'history' && <HistoryView logs={logs} perfil={perfil} db={db} />}
                        {vista === 'rules' && <RulesView />}
                        {vista === 'admin' && <AdminView users={usuarios} db={db} />}
                    </main>

                    {toast && (
                        <div className="fixed bottom-32 left-6 right-6 z-[100] animate-toast pointer-events-none">
                            <div className="max-w-xl mx-auto bg-orange-600 text-white p-6 rounded-2xl shadow-2xl flex items-center gap-4 border border-orange-400/50">
                                <p className="font-black uppercase italic text-sm tracking-tight">{toast}</p>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 w-full bg-black/95 border-t border-[#1a1a1a] p-4 flex justify-around pb-10 backdrop-blur-2xl z-[60]">
                        <div className="max-w-lg w-full flex justify-around items-center">
                            <NavButton active={vista==='ranking'} onClick={()=>setVista('ranking')} icon="trophy" />
                            <NavButton active={vista==='history'} onClick={()=>setVista('history')} icon="history" />
                            
                            <button onClick={()=>setVista('add')} className="bg-orange-600 text-white p-6 rounded-3xl shadow-[0_0_20px_rgba(234,88,12,0.4)] -mt-16 border-4 border-[#0a0a0c] active:scale-90 transition-transform">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>

                            <NavButton active={vista==='rules'} onClick={()=>setVista('rules')} icon="book" />
                            
                            {perfil.role === 'admin' && (
                                <NavButton active={vista==='admin'} onClick={()=>setVista('admin')} icon="settings" />
                            )}
                            <NavButton active={false} onClick={salir} icon="logout" />
                        </div>
                    </nav>
                </div>
            );
        }

        const NavButton = ({ active, onClick, icon }) => {
            const icons = {
                trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6m12 5h1.5a2.5 2.5 0 0 0 0-5H18M4.5 22h15M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22h10c0-1.76-.85-3.25-2.03-3.79-.5-.23-.97-.66-.97-1.21v-2.34c2.58-.29 4.61-2.48 4.61-5.16V5H5.39v4.5c0 2.68 2.03 4.87 4.61 5.16z"/>,
                history: <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>,
                book: <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20M4 19.5V5A2.5 2.5 0 0 1 6.5 2.5H20v11.66a2.5 2.5 0 0 1-2.5 2.5H6.5a2.5 2.5 0 0 1-2.5-2.5z"/>,
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>,
                logout: <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
            };
            return (
                <button onClick={onClick} className={`p-4 transition-all ${active ? 'text-orange-500 scale-125' : 'text-gray-700 hover:text-gray-400'}`}>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">{icons[icon]}</svg>
                </button>
            );
        };

        const RankingView = ({ logs, users }) => {
            const [timeframe, setTimeframe] = useState('month');
            const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth());
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());

            const ranking = useMemo(() => {
                // Filtramos a los administradores del ranking
                return users.filter(u => u.role !== 'admin').map(u => {
                    const userLogs = logs.filter(l => {
                        // REGLA CLAVE: El log debe pertenecer a ESTE usuario específico
                        if (l.userId !== u.id) return false;

                        const d = new Date(l.date);
                        if (timeframe === 'month') {
                            return d.getMonth() === selectedMonth && d.getFullYear() === selectedYear;
                        }
                        return d.getFullYear() === selectedYear;
                    });
                    
                    return { 
                        ...u, 
                        points: userLogs.reduce((s, l) => s + (l.points || 0), 0) 
                    };
                }).sort((a, b) => b.points - a.points);
            }, [logs, users, timeframe, selectedMonth, selectedYear]);

            const topMember = ranking[0];

            return (
                <div className="space-y-8 animate-in w-full">
                    <div className="flex bg-[#111] p-1.5 rounded-2xl border border-[#222]">
                        <button onClick={()=>setTimeframe('month')} className={`flex-1 py-4 rounded-xl font-black text-xs uppercase tracking-widest transition-all ${timeframe === 'month' ? 'bg-orange-600 text-white' : 'text-gray-600'}`}>Mensual</button>
                        <button onClick={()=>setTimeframe('year')} className={`flex-1 py-4 rounded-xl font-black text-xs uppercase tracking-widest transition-all ${timeframe === 'year' ? 'bg-orange-600 text-white' : 'text-gray-600'}`}>Anual</button>
                    </div>
                    <div className="flex gap-4">
                        {timeframe === 'month' && (
                            <select value={selectedMonth} onChange={e => setSelectedMonth(parseInt(e.target.value))} className="flex-1 bg-[#111] border border-[#222] p-4 rounded-xl font-black text-xs uppercase text-orange-500 outline-none appearance-none text-center">
                                {MONTHS.map((m, i) => <option key={m} value={i}>{m}</option>)}
                            </select>
                        )}
                        <select value={selectedYear} onChange={e => setSelectedYear(parseInt(e.target.value))} className="w-32 bg-[#111] border border-[#222] p-4 rounded-xl font-black text-xs uppercase text-orange-500 outline-none appearance-none text-center">
                            <option value={2025}>2025</option>
                        </select>
                    </div>
                    <div className="bg-black border border-orange-600/30 p-10 md:p-16 rounded-[3rem] shadow-2xl relative overflow-hidden text-center md:text-left">
                        <div className="absolute top-0 left-0 w-full h-1 bg-orange-600/30"></div>
                        <p className="text-[12px] font-black uppercase tracking-[0.4em] text-orange-500 mb-4">Líder {timeframe === 'month' ? 'de ' + MONTHS[selectedMonth] : 'del Año'}</p>
                        <p className="text-4xl md:text-6xl font-black uppercase italic tracking-tighter mb-6 truncate">{topMember?.points > 0 ? topMember.name : "..."}</p>
                        <div className="flex items-baseline justify-center md:justify-start gap-4">
                            <span className="text-6xl md:text-8xl font-black italic">{topMember?.points || 0}</span>
                            <span className="text-xs font-black uppercase opacity-40 tracking-widest">puntos</span>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 gap-4">
                        {ranking.map((u, i) => (
                            <div key={u.id} className="bg-[#111] p-6 rounded-3xl flex justify-between items-center border border-[#1a1a1a]">
                                <div className="flex items-center gap-6">
                                    <span className={`font-black italic text-lg ${i === 0 ? 'text-orange-500' : 'text-gray-800'}`}>#{i+1}</span>
                                    <span className="font-black uppercase text-sm tracking-tight text-white">{u.name}</span>
                                </div>
                                <span className="font-black text-2xl italic text-orange-600">{u.points}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const AddView = ({ onAdd, onClose }) => {
            const [selected, setSelected] = useState([]);
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [location, setLocation] = useState('');
            const toggle = (id) => setSelected(p => p.includes(id) ? p.filter(i => i !== id) : [...p, id]);

            return (
                <div className="space-y-8 animate-in w-full max-w-2xl mx-auto">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-black uppercase italic tracking-tighter text-orange-500">NUEVO REPORTE</h2>
                        <button onClick={onClose} className="bg-[#111] p-2 rounded-full text-gray-500">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                    <div className="space-y-2">
                        <label className="text-[10px] font-black uppercase text-gray-500 tracking-widest">Fecha</label>
                        <input type="date" value={date} onChange={e => setDate(e.target.value)} className="w-full bg-[#111] border border-[#222] p-5 rounded-2xl font-black text-white outline-none focus:border-orange-600" />
                    </div>
                    <div className="grid grid-cols-1 gap-3">
                        {ACTIVITIES.filter(a=>a.id!=='bonus_racha').map(act => (
                            <button key={act.id} onClick={()=>toggle(act.id)} className={`p-5 rounded-2xl border-2 text-left flex justify-between items-center transition-all ${selected.includes(act.id) ? 'border-orange-600 bg-orange-600/10' : 'border-[#111] bg-[#111] opacity-70'}`}>
                                <div className="flex flex-col">
                                    <span className="font-black uppercase text-[11px] text-white">{act.label}</span>
                                    <span className="text-[9px] font-bold text-gray-600 uppercase italic">{act.desc}</span>
                                </div>
                                <span className="text-lg font-black text-orange-600">+{act.points}</span>
                            </button>
                        ))}
                    </div>
                    {selected.includes('aventura') && (
                        <div className="space-y-2">
                            <label className="text-[10px] font-black uppercase text-orange-600 tracking-widest">Localización</label>
                            <input type="text" placeholder="¿Dónde?" value={location} onChange={e => setLocation(e.target.value)} className="w-full bg-black border border-orange-600 p-5 rounded-2xl font-black uppercase text-white outline-none" />
                        </div>
                    )}
                    <button onClick={()=>onAdd(selected, location, date)} disabled={selected.length===0 || (selected.includes('aventura') && !location.trim())} className="w-full bg-orange-600 p-6 rounded-3xl font-black uppercase text-white shadow-2xl active:scale-95 disabled:opacity-30 transition-all text-lg">REGISTRAR PINCHAZO</button>
                </div>
            );
        };

        const HistoryView = ({ logs, perfil, db }) => {
            const deleteLog = async (id) => {
                const { doc, deleteDoc } = window.fb;
                if(confirm('¿Borrar registro?')) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'logs', id));
                }
            };
            return (
                <div className="space-y-6 animate-in w-full">
                    <h2 className="text-2xl font-black uppercase italic tracking-tighter">HISTORIAL</h2>
                    <div className="grid grid-cols-1 gap-4">
                        {logs.map(log => (
                            <div key={log.id} className="bg-[#111] p-6 rounded-3xl border border-[#1a1a1a] relative group">
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <p className="text-[10px] font-black text-orange-600 uppercase mb-1">{log.userName}</p>
                                        <p className="text-[9px] font-bold text-gray-600 uppercase">{log.date}</p>
                                    </div>
                                    <p className="text-3xl font-black italic text-white">+{log.points}</p>
                                </div>
                                <div className="flex flex-wrap gap-2 mb-4">
                                    {log.activities.map((actId, i) => (
                                        <span key={i} className="bg-black text-[8px] font-black uppercase px-3 py-1.5 rounded-lg border border-[#222] text-gray-500">
                                            {ACTIVITIES.find(a=>a.id===actId)?.label || actId}
                                        </span>
                                    ))}
                                </div>
                                <div className="flex justify-between items-center">
                                    {log.location ? <span className="text-[9px] font-black uppercase text-orange-500 italic">{log.location}</span> : <span></span>}
                                    {(log.userId === perfil.id || perfil.role === 'admin') && (
                                        <button onClick={()=>deleteLog(log.id)} className="text-red-900 text-[10px] font-black px-3 py-1 bg-red-900/10 rounded-lg">ELIMINAR</button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const RulesView = () => (
            <div className="space-y-4 animate-in w-full">
                <h2 className="text-2xl font-black uppercase italic tracking-tighter">SISTEMA DE PUNTOS</h2>
                <div className="grid grid-cols-1 gap-3">
                    {ACTIVITIES.map(act => (
                        <div key={act.id} className="bg-[#111] p-5 rounded-2xl flex justify-between items-center border border-[#1a1a1a]">
                            <div className="max-w-[70%]">
                                <p className="font-black uppercase text-[10px] text-white mb-1">{act.label}</p>
                                <p className="text-[9px] font-bold text-gray-600 uppercase italic">{act.desc}</p>
                            </div>
                            <div className="bg-black px-4 py-2 rounded-xl font-black text-xs text-orange-500">+{act.points}</div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const AdminView = ({ users, db }) => {
            const [f, setF] = useState({ n: '', p: '' });
            const [editingId, setEditingId] = useState(null);

            const save = async () => {
                const { doc, setDoc, updateDoc } = window.fb;
                if (!f.n || !f.p) return;
                if (editingId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', editingId), { name: f.n.toUpperCase(), pin: f.p });
                    setEditingId(null);
                } else {
                    const id = 'u' + Date.now();
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id), { id, name: f.n.toUpperCase(), pin: f.p, role: 'user' });
                }
                setF({ n: '', p: '' });
            };

            return (
                <div className="space-y-8 animate-in w-full">
                    <div className="bg-[#111] p-8 rounded-[2rem] border border-orange-600/20">
                        <h3 className="text-[10px] font-black uppercase text-center mb-6 text-orange-500 tracking-widest">{editingId ? 'EDITAR SOCIO' : 'NUEVO SOCIO'}</h3>
                        <div className="space-y-3">
                            <input type="text" placeholder="NOMBRE" value={f.n} onChange={e=>setF({...f, n: e.target.value})} className="w-full bg-black p-4 rounded-xl font-black text-white border border-[#222] uppercase outline-none" />
                            <input type="text" placeholder="PIN" value={f.p} onChange={e=>setF({...f, p: e.target.value})} className="w-full bg-black p-4 rounded-xl font-black text-white border border-[#222] outline-none" />
                        </div>
                        <div className="flex gap-3 mt-6">
                            {editingId && <button onClick={() => {setEditingId(null); setF({n:'',p:''});}} className="flex-1 bg-gray-900 text-white p-4 rounded-xl font-black text-xs">X</button>}
                            <button onClick={save} className="flex-[3] bg-white text-black p-4 rounded-xl font-black uppercase text-xs">{editingId ? 'ACTUALIZAR' : 'REGISTRAR'}</button>
                        </div>
                    </div>
                    <div className="space-y-3">
                        {users.map(u => (
                            <div key={u.id} className="bg-[#111] p-5 rounded-2xl flex justify-between items-center border border-[#1a1a1a]">
                                <div className="flex flex-col">
                                    <span className="font-black uppercase text-xs text-white">{u.name}</span>
                                    <span className="text-[9px] font-bold text-gray-600">PIN: {u.pin} {u.role === 'admin' && '• ADMIN'}</span>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => {setEditingId(u.id); setF({n:u.name, p:u.pin});}} className="text-orange-500 text-[10px] font-black uppercase">Editar</button>
                                    {u.role !== 'admin' && (
                                        <button onClick={async () => { if(confirm('¿Borrar?')) { const {doc,deleteDoc}=window.fb; await deleteDoc(doc(db,'artifacts',appId,'public','data','users',u.id)); } }} className="text-red-900 text-[10px] font-black uppercase">Borrar</button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
