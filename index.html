<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>La Liga de los Pinchazos</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="La Liga">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        ::-webkit-scrollbar { display: none; }
        .animate-pop { animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const myFirebaseConfig = {
            apiKey: "AIzaSyDINnwVzfZvX9ivIHbxdAe1sNT8Pmkt5A8",
            authDomain: "la-liga-campera.firebaseapp.com",
            projectId: "la-liga-campera",
            storageBucket: "la-liga-campera.firebasestorage.app",
            messagingSenderId: "1080963476365",
            appId: "1:1080963476365:web:2f081ca4e23a246a356bc4",
            measurementId: "G-JLF2ZZJ311"
        };

        try {
            window.FirebaseApp = initializeApp(myFirebaseConfig);
            window.FirebaseAuth = getAuth(window.FirebaseApp);
            window.FirebaseDB = getFirestore(window.FirebaseApp);
            window.FirebaseUtils = { collection, doc, setDoc, addDoc, onSnapshot, deleteDoc, query, signInAnonymously, onAuthStateChanged };
        } catch (e) {
            console.error("Error inicializando Firebase:", e);
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const ACTIVITIES = [
            { id: 'estandar', label: 'Pinchazo estándar', points: 3, desc: 'Introducir el hurón en la cueva' },
            { id: 'conejero', label: 'Conejero rápido', points: 2, desc: '4 o 5 estoques a tope de revoluciones' },
            { id: 'daison', label: 'Daison', points: 1, desc: 'Succión de cilindro o meter cabeza en cueva' },
            { id: 'martillo', label: 'Martillo Neumático', points: 2, desc: 'Pajita o cubana sacando el veneno' },
            { id: 'tras', label: 'Tras tras por detrás', points: 12, desc: 'Entrar por la puerta campo' },
            { id: 'juegos', label: 'Vamos a jugar', points: 1, desc: 'Uso de juegos eróticos' },
            { id: 'aventura', label: 'A la aventura', points: 10, desc: 'Sitio poco usual' },
            { id: 'bonus_racha', label: 'BONUS RACHA', points: 2, desc: 'Actividad 2 días seguidos' },
        ];

        const LocalDB = {
            get: (key, def) => JSON.parse(localStorage.getItem(`offline_${key}`)) || def,
            set: (key, val) => localStorage.setItem(`offline_${key}`, JSON.stringify(val))
        };

        const CustomModal = ({ isOpen, title, message, onConfirm, onCancel, confirmText = "Confirmar", cancelText = "Cancelar", isDanger = false }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-sm animate-pop">
                    <div className="bg-white w-full max-w-xs rounded-[2rem] p-8 shadow-2xl text-center">
                        <h3 className="text-xl font-black uppercase italic tracking-tighter mb-2">{title}</h3>
                        <p className="text-sm text-slate-500 font-bold mb-8 leading-relaxed">{message}</p>
                        <div className="flex flex-col gap-3">
                            <button onClick={onConfirm} className={`w-full py-4 rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg active:scale-95 transition-all ${isDanger ? 'bg-red-500 text-white shadow-red-200' : 'bg-slate-900 text-white'}`}>
                                {confirmText}
                            </button>
                            <button onClick={onCancel} className="w-full py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] text-slate-400">
                                {cancelText}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeProfile, setActiveProfile] = useState(null);
            const [allUsers, setAllUsers] = useState([]);
            const [allLogs, setAllLogs] = useState([]);
            const [view, setView] = useState('ranking');
            const [loading, setLoading] = useState(true);
            const [isOffline, setIsOffline] = useState(false);
            const [motivation, setMotivation] = useState(null);
            const [showLogoutModal, setShowLogoutModal] = useState(false);
            const [userToDelete, setUserToDelete] = useState(null);
            const [loginName, setLoginName] = useState('');
            const [loginPin, setLoginPin] = useState('');
            const [loginError, setLoginError] = useState('');

            useEffect(() => {
                const startApp = async () => {
                    if (!window.FirebaseAuth) {
                        useLocalMode();
                        return;
                    }
                    try {
                        await window.FirebaseUtils.signInAnonymously(window.FirebaseAuth);
                        window.FirebaseUtils.onAuthStateChanged(window.FirebaseAuth, (user) => {
                            if (user) {
                                setupFirebaseListeners();
                            } else {
                                useLocalMode();
                            }
                        });
                    } catch (e) {
                        useLocalMode();
                    }
                };

                const setupFirebaseListeners = () => {
                    const db = window.FirebaseDB;
                    const { collection, onSnapshot } = window.FirebaseUtils;

                    onSnapshot(collection(db, 'usuarios_liga'), (snap) => {
                        const users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        if (users.length === 0) {
                            const adminId = "admin_init";
                            window.FirebaseUtils.setDoc(window.FirebaseUtils.doc(db, 'usuarios_liga', adminId), {
                                id: adminId, name: 'Admin', pin: '1234', role: 'admin'
                            });
                        }
                        setAllUsers(users);
                    }, (err) => { useLocalMode(); });

                    onSnapshot(collection(db, 'logs_liga'), (snap) => {
                        const logs = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                            .sort((a,b) => (b.date || '').localeCompare(a.date || ''));
                        setAllLogs(logs);
                        setLoading(false);
                    });
                };

                const useLocalMode = () => {
                    setIsOffline(true);
                    setAllUsers(LocalDB.get('users', [{ id: 'admin_local', name: 'Admin', pin: '1234', role: 'admin' }]));
                    setAllLogs(LocalDB.get('logs', []));
                    setLoading(false);
                };

                startApp();
                const saved = localStorage.getItem('liga_perfil');
                if (saved) setActiveProfile(JSON.parse(saved));
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view, loading, activeProfile]);

            const handleLogin = (e) => {
                e.preventDefault();
                const found = allUsers.find(u => 
                    u.name.toLowerCase() === loginName.toLowerCase().trim() && 
                    u.pin.toString() === loginPin.trim()
                );
                if (found) {
                    setActiveProfile(found);
                    localStorage.setItem('liga_perfil', JSON.stringify(found));
                } else {
                    setLoginError('Datos incorrectos');
                }
            };

            const logout = () => {
                localStorage.removeItem('liga_perfil');
                setActiveProfile(null);
                setShowLogoutModal(false);
            };

            const handleAddLog = async (ids, date) => {
                const prevDate = new Date(date);
                prevDate.setDate(prevDate.getDate() - 1);
                const prevStr = prevDate.toISOString().split('T')[0];
                const hasStreak = allLogs.some(l => l.userId === activeProfile.id && l.date === prevStr);
                
                let finalIds = [...ids];
                if (hasStreak) finalIds.push('bonus_racha');
                const pts = finalIds.reduce((s, id) => s + (ACTIVITIES.find(a => a.id === id)?.points || 0), 0);

                const newLog = {
                    userId: activeProfile.id,
                    userName: activeProfile.name,
                    activities: finalIds,
                    points: pts,
                    date: date,
                    createdAt: new Date().toISOString()
                };

                if (!isOffline) {
                    await window.FirebaseUtils.addDoc(window.FirebaseUtils.collection(window.FirebaseDB, 'logs_liga'), newLog);
                } else {
                    const updatedLogs = [{...newLog, id: Date.now().toString()}, ...allLogs];
                    setAllLogs(updatedLogs);
                    LocalDB.set('logs', updatedLogs);
                }
                
                setMotivation(hasStreak ? "¡BONUS RACHA! 🔥🚀" : "¡REGISTRADO! 🔥");
                setTimeout(() => setMotivation(null), 2500);
                setView('ranking');
            };

            const handleDeleteLog = async (id) => {
                if (!isOffline) {
                    await window.FirebaseUtils.deleteDoc(window.FirebaseUtils.doc(window.FirebaseDB, 'logs_liga', id));
                } else {
                    const updated = allLogs.filter(l => l.id !== id);
                    setAllLogs(updated);
                    LocalDB.set('logs', updated);
                }
            };

            const handleAddUser = async (n, p) => {
                const id = "u_" + Date.now();
                const newUser = { id, name: n, pin: p, role: 'user' };
                if (!isOffline) {
                    await window.FirebaseUtils.setDoc(window.FirebaseUtils.doc(window.FirebaseDB, 'usuarios_liga', id), newUser);
                } else {
                    const updated = [...allUsers, newUser];
                    setAllUsers(updated);
                    LocalDB.set('users', updated);
                }
            };

            if (loading) return <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-white p-10 text-center">
                <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-pink-500 mb-4"></div>
                <p className="font-black uppercase italic tracking-widest text-[10px]">Cargando...</p>
            </div>;

            if (!activeProfile) return (
                <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-6 text-white max-w-md mx-auto">
                    <div className="bg-pink-600 p-4 rounded-3xl mb-6 shadow-2xl animate-pop">
                        <i data-lucide="flame" className="w-10 h-10 text-white fill-current"></i>
                    </div>
                    <h1 className="text-4xl font-black italic uppercase tracking-tighter mb-10 text-center leading-none">LA LIGA DE LOS<br/>PINCHAZOS</h1>
                    
                    <form onSubmit={handleLogin} className="w-full space-y-4">
                        <input type="text" placeholder="USUARIO" value={loginName} onChange={e => setLoginName(e.target.value)} className="w-full bg-slate-900 border-2 border-slate-800 p-5 rounded-2xl font-black text-white focus:border-pink-500 outline-none uppercase" />
                        <input type="password" placeholder="PIN" value={loginPin} onChange={e => setLoginPin(e.target.value)} className="w-full bg-slate-900 border-2 border-slate-800 p-5 rounded-2xl font-black text-white focus:border-pink-500 outline-none" />
                        {loginError && <p className="text-red-500 text-[10px] font-black text-center uppercase">{loginError}</p>}
                        <button type="submit" className="w-full bg-white text-slate-950 p-5 rounded-2xl font-black uppercase tracking-widest active:scale-95 transition-all">Entrar</button>
                    </form>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 flex flex-col max-w-md mx-auto shadow-2xl relative overflow-hidden">
                    <CustomModal isOpen={showLogoutModal} title="Salir" message="¿Cerrar sesión?" onConfirm={logout} onCancel={() => setShowLogoutModal(false)} />
                    <CustomModal isOpen={!!userToDelete} title="Eliminar" message="¿Borrar usuario?" onConfirm={() => {
                        if (!isOffline) window.FirebaseUtils.deleteDoc(window.FirebaseUtils.doc(window.FirebaseDB, 'usuarios_liga', userToDelete));
                        else { const upd = allUsers.filter(u => u.id !== userToDelete); setAllUsers(upd); LocalDB.set('users', upd); }
                        setUserToDelete(null);
                    }} onCancel={() => setUserToDelete(null)} isDanger={true} />

                    {motivation && <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] bg-slate-900 text-white px-8 py-4 rounded-full font-black shadow-2xl border-2 border-pink-500 animate-pop">{motivation}</div>}

                    <header className="bg-white p-6 border-b border-slate-100 flex justify-between items-center shrink-0">
                        <h2 className="text-xl font-black italic uppercase tracking-tighter">LA LIGA</h2>
                        <div className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase italic">{activeProfile.name}</div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 pb-32">
                        {view === 'ranking' && <RankingView allLogs={allLogs} allUsers={allUsers} />}
                        {view === 'add' && <AddView onAdd={handleAddLog} />}
                        {view === 'history' && <HistoryView logs={allLogs} user={activeProfile} onDelete={handleDeleteLog} />}
                        {view === 'rules' && <RulesView />}
                        {view === 'admin' && <AdminView allUsers={allUsers} onAdd={handleAddUser} onDeleteRequest={setUserToDelete} />}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-xl border-t border-slate-100 p-4 flex justify-around items-end safe-bottom shadow-2xl rounded-t-[40px] z-[60]">
                        <NavBtn icon="trophy" active={view==='ranking'} onClick={()=>setView('ranking')} />
                        <NavBtn icon="history" active={view==='history'} onClick={()=>setView('history')} />
                        <div className="relative"><button onClick={()=>setView('add')} className="bg-pink-600 text-white p-6 rounded-[2.5rem] -mb-8 shadow-2xl border-8 border-slate-50 active:scale-90 transition-all"><i data-lucide="plus" className="w-8 h-8 stroke-[3]"></i></button></div>
                        <NavBtn icon="book-open" active={view==='rules'} onClick={()=>setView('rules')} />
                        <div className="flex">
                            {activeProfile.role === 'admin' && <NavBtn icon="settings" active={view==='admin'} onClick={()=>setView('admin')} />}
                            <button onClick={() => setShowLogoutModal(true)} className="p-4 rounded-2xl text-slate-400"><i data-lucide="log-out" className="w-6 h-6"></i></button>
                        </div>
                    </nav>
                </div>
            );
        };

        const NavBtn = ({ icon, active, onClick }) => (
            <button onClick={onClick} className={`p-4 rounded-2xl transition-all ${active ? 'text-pink-600 bg-pink-50' : 'text-slate-400'}`}>
                <i data-lucide={icon} className="w-6 h-6"></i>
            </button>
        );

        const RankingView = ({ allLogs, allUsers }) => {
            const [timeframe, setTimeframe] = useState('mensual'); 
            const now = new Date();
            const ranking = useMemo(() => {
                const filtered = allLogs.filter(l => {
                    const d = new Date(l.date);
                    return timeframe === 'mensual' ? d.getMonth() === now.getMonth() : d.getFullYear() === now.getFullYear();
                });
                return allUsers.filter(u => u.role !== 'admin').map(u => ({
                    ...u, points: filtered.filter(l => l.userId === u.id).reduce((s, l) => s + (l.points || 0), 0)
                })).sort((a, b) => b.points - a.points);
            }, [allLogs, allUsers, timeframe]);

            return (
                <div className="space-y-4">
                    <div className="flex bg-slate-200 p-1 rounded-2xl mb-4">
                        <button onClick={() => setTimeframe('mensual')} className={`flex-1 py-3 rounded-xl font-black uppercase text-[10px] ${timeframe==='mensual'?'bg-white shadow-sm':''}`}>Mensual</button>
                        <button onClick={() => setTimeframe('anual')} className={`flex-1 py-3 rounded-xl font-black uppercase text-[10px] ${timeframe==='anual'?'bg-white shadow-sm':''}`}>Anual</button>
                    </div>
                    <div className="bg-slate-900 rounded-[3rem] p-10 text-white shadow-xl flex flex-col items-center relative mb-6">
                        <i data-lucide="trophy" className="w-12 h-12 text-yellow-400 mb-4 fill-current"></i>
                        <h3 className="text-xs font-black uppercase tracking-[0.4em] opacity-50 mb-1">Líder {timeframe}</h3>
                        <p className="text-3xl font-black italic uppercase tracking-tighter text-center">{ranking[0]?.name || "Sin datos"}</p>
                        <p className="text-5xl font-black text-pink-500 italic mt-2">{ranking[0]?.points || 0} PTS</p>
                    </div>
                    {ranking.map((u, i) => (
                        <div key={u.id} className="bg-white p-5 rounded-3xl flex items-center justify-between border border-slate-100 shadow-sm animate-pop">
                            <div className="flex items-center gap-4">
                                <span className={`w-8 font-black italic ${i < 3 ? 'text-pink-500' : 'text-slate-300'}`}>{i+1}</span>
                                <span className="font-black uppercase text-slate-800">{u.name}</span>
                            </div>
                            <span className="text-2xl font-black text-pink-600 italic">{u.points}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const AddView = ({ onAdd }) => {
            const [selected, setSelected] = useState([]);
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const toggle = (id) => setSelected(p => p.includes(id) ? p.filter(i => i !== id) : [...p, id]);
            return (
                <div className="space-y-4 animate-pop">
                    <h2 className="text-2xl font-black uppercase italic tracking-tighter">Nueva Sesión</h2>
                    <input type="date" value={date} onChange={e => setDate(e.target.value)} className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-black uppercase text-sm" />
                    <div className="grid gap-2">
                        {ACTIVITIES.filter(a => a.id !== 'bonus_racha').map(act => (
                            <button key={act.id} onClick={() => toggle(act.id)} className={`flex items-center justify-between p-5 rounded-3xl border-2 ${selected.includes(act.id) ? 'border-pink-500 bg-pink-50' : 'border-white bg-white'}`}>
                                <div className="text-left"><p className="font-black uppercase text-sm">{act.label}</p></div>
                                <span className={`w-10 h-10 rounded-xl flex items-center justify-center font-black ${selected.includes(act.id) ? 'bg-pink-600 text-white' : 'bg-slate-50 text-slate-400'}`}>+{act.points}</span>
                            </button>
                        ))}
                    </div>
                    <button onClick={() => onAdd(selected, date)} disabled={selected.length===0} className="w-full bg-slate-900 text-white p-6 rounded-3xl font-black uppercase tracking-widest shadow-xl">Guardar</button>
                </div>
            );
        };

        const HistoryView = ({ logs, user, onDelete }) => (
            <div className="space-y-4">
                <h2 className="text-2xl font-black uppercase italic tracking-tighter">Historial</h2>
                {logs.length === 0 && <p className="text-center text-slate-300 font-black uppercase py-10">Nada registrado aún</p>}
                {logs.map(log => (
                    <div key={log.id} className="bg-white p-6 rounded-[2rem] border border-slate-100 relative">
                        {log.activities.includes('bonus_racha') && <div className="absolute top-0 right-0 bg-orange-500 text-white text-[7px] font-black px-3 py-1 uppercase italic rounded-bl-xl shadow-sm">Racha 🔥</div>}
                        <div className="flex justify-between items-start">
                            <span className="text-3xl font-black text-pink-600 italic">{log.points} PTS</span>
                            {(user.role === 'admin' || user.id === log.userId) && (
                                <button onClick={() => onDelete(log.id)} className="text-slate-200 hover:text-red-500 p-2"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                            )}
                        </div>
                        <p className="text-[10px] font-black uppercase text-slate-400 mb-2">{log.date} · {log.userName}</p>
                        <div className="flex flex-wrap gap-1">
                            {log.activities.map(id => <span key={id} className="text-[8px] font-black uppercase px-2 py-1 rounded bg-slate-50 text-slate-500 border border-slate-100">{ACTIVITIES.find(a => a.id === id)?.label || id}</span>)}
                        </div>
                    </div>
                ))}
            </div>
        );

        const AdminView = ({ allUsers, onAdd, onDeleteRequest }) => {
            const [n, setN] = useState('');
            const [p, setP] = useState('');
            return (
                <div className="space-y-6">
                    <div className="bg-white p-6 rounded-[2rem] border border-slate-100 space-y-3">
                        <input type="text" placeholder="NOMBRE" value={n} onChange={e => setN(e.target.value)} className="w-full p-4 bg-slate-50 rounded-xl font-black uppercase" />
                        <input type="text" placeholder="PIN" value={p} onChange={e => setP(e.target.value)} className="w-full p-4 bg-slate-50 rounded-xl font-black" />
                        <button onClick={() => { onAdd(n, p); setN(''); setP(''); }} className="w-full bg-slate-900 text-white font-black p-4 rounded-xl uppercase text-xs">Crear Usuario</button>
                    </div>
                    <div className="space-y-2">
                        {allUsers.map(u => (
                            <div key={u.id} className="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100">
                                <div><p className="font-black uppercase text-sm">{u.name}</p><p className="text-[9px] font-bold text-slate-400">PIN: {u.pin}</p></div>
                                {u.role !== 'admin' && <button onClick={() => onDeleteRequest(u.id)} className="text-slate-200 hover:text-red-500 p-2"><i data-lucide="user-minus" className="w-5 h-5"></i></button>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const RulesView = () => (
            <div className="space-y-3">
                <h2 className="text-2xl font-black uppercase italic tracking-tighter">Reglamento</h2>
                {ACTIVITIES.map(act => (
                    <div key={act.id} className="bg-white p-5 rounded-[2rem] flex items-center justify-between shadow-sm border border-slate-100">
                        <div className="flex-1 pr-4">
                            <p className="font-black uppercase text-sm tracking-tight">{act.label}</p>
                            <p className="text-[8px] font-bold text-slate-400 uppercase italic mt-1">{act.desc}</p>
                        </div>
                        <span className="bg-pink-600 text-white w-10 h-10 rounded-xl flex items-center justify-center font-black italic shrink-0">+{act.points}</span>
                    </div>
                ))}
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
